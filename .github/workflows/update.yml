name: Update MLB team stats

on:
  schedule:
    # 09:00 UTC = 4:00 AM EST. GitHub cron is UTC and does not observe DST,
    # so during Eastern Daylight Time this effectively runs at 5:00 AM EDT.
    - cron: "0 9 * * *"
  workflow_dispatch: {}      # allow manual runs from the Actions tab

permissions:
  contents: write

concurrency:
  group: update-stats
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Scrape ESPN and build outputs
        run: |
          python scraper/scrape.py
          python scraper/build_outputs.py

      - name: Commit refreshed data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/data/season.json docs/data/last7.json docs/data/meta.json docs/data/mlb_team_stats.xlsx
          if git diff --staged --quiet; then
            echo "No data changes."
          else
            git commit -m "chore: refresh MLB team stats [skip ci]"
            git push
          fi
